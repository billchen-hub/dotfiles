# ============================================
# tmux config for Claude Code multi-project workflow
# ============================================

# --- Prefix key: Ctrl+A (easier than default Ctrl+B) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General settings ---
set -g default-terminal "tmux-256color"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g display-time 3000
set -g status-interval 5
set -g focus-events on

# --- Status bar ---
set -g status-position bottom
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]| "
set -g status-right "#[fg=#565f89]| #[fg=#9ece6a]%H:%M #[fg=#565f89]| #[fg=#bb9af7]%m/%d "
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# --- Pane borders ---
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Window splitting (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- New window keeps current path ---
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation with Alt+Arrow (no prefix needed) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Window navigation with Shift+Arrow (no prefix needed) ---
bind -n S-Left previous-window
bind -n S-Right next-window

# --- Session navigation ---
bind ( switch-client -p
bind ) switch-client -n

# --- Resize panes with Prefix + HJKL ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Quick project session switching (Prefix + number jumps to session) ---
# Use: Prefix + s to list all sessions and pick one

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Copy mode (vi style) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# --- Activity monitoring ---
setw -g monitor-activity on
set -g visual-activity off
